<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medical Research Summarizer</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:       #1d4ed8;
      --primary-dark:  #1e3a8a;
      --primary-light: #eff6ff;
      --primary-mid:   #3b82f6;
      --teal:          #0d9488;
      --teal-light:    #f0fdfa;
      --red:           #dc2626;
      --red-light:     #fef2f2;
      --amber:         #d97706;
      --amber-light:   #fffbeb;
      --green:         #16a34a;
      --green-light:   #f0fdf4;
      --surface:       #ffffff;
      --bg:            #f1f5f9;
      --border:        #e2e8f0;
      --text:          #0f172a;
      --muted:         #64748b;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    @keyframes fadeUp   { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes scaleIn  { from { opacity:0; transform:scale(.93); }       to { opacity:1; transform:scale(1); } }
    @keyframes spin     { to   { transform:rotate(360deg); } }
    @keyframes pulse    { 0%,100% { opacity:1; } 50% { opacity:.45; } }
    @keyframes glow     { 0%,100% { box-shadow:0 0 0 0 rgba(29,78,216,.25); } 50% { box-shadow:0 0 0 8px rgba(29,78,216,0); } }

    .fade-up  { animation: fadeUp  .4s ease both; }
    .scale-in { animation: scaleIn .35s ease both; }

    /* Responsive grids */
    .grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
    .grid-2 { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
    .grid-auto { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:12px; }

    @media (max-width:820px) {
      .grid-3 { grid-template-columns:1fr; }
      .grid-2 { grid-template-columns:1fr; }
    }
    @media (max-width:600px) {
      .reco-inner { grid-template-columns:1fr !important; }
    }

    /* Textarea */
    textarea {
      width:100%; resize:vertical;
      border:1.5px solid var(--border); border-radius:8px;
      padding:12px 14px; font-family:inherit; font-size:.875rem;
      color:var(--text); background:#fff; outline:none;
      transition:border-color .2s, box-shadow .2s; line-height:1.6;
    }
    textarea:focus { border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,.12); }
    textarea::placeholder { color:#94a3b8; }
    textarea:disabled { opacity:.5; cursor:not-allowed; background:#f8fafc; }

    button { cursor:pointer; border:none; font-family:inherit; }
    button:disabled { cursor:not-allowed; opacity:.55; }

    /* Scrollbar */
    ::-webkit-scrollbar { width:5px; height:5px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:3px; }
    ::-webkit-scrollbar-thumb:hover { background:#94a3b8; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ─── helpers ──────────────────────────────────────────────────────────── */

function parseField(text, field) {
  const m = (text || '').match(new RegExp(field + ':\\s*([\\s\\S]+?)(?=\\n[A-Z_]+:|$)'));
  return m ? m[1].trim() : '';
}
function parseFindings(text) {
  return (text||'').split('---').map(b=>b.trim()).filter(Boolean).map(b=>({
    finding: parseField(b,'FINDING'), value: parseField(b,'VALUE'),
    context: parseField(b,'CONTEXT'), significance: parseField(b,'SIGNIFICANCE'),
  })).filter(f=>f.finding);
}
function parseRisks(text) {
  return (text||'').split('---').map(b=>b.trim()).filter(Boolean).map(b=>({
    riskItem: parseField(b,'RISK_ITEM'),
    severity: (parseField(b,'SEVERITY')||'').toUpperCase(),
    description: parseField(b,'DESCRIPTION'),
    implication: parseField(b,'CLINICAL_IMPLICATION'),
  })).filter(r=>r.riskItem);
}
function parseRecos(text) {
  return (text||'').split('---').map(b=>b.trim()).filter(Boolean).map(b=>({
    recommendation: parseField(b,'RECOMMENDATION'),
    patientProfile: parseField(b,'PATIENT_PROFILE'),
    dosage: parseField(b,'DOSAGE_OR_PROTOCOL'),
    monitoring: parseField(b,'MONITORING'),
    contraindication: parseField(b,'CONTRAINDICATION'),
    evidenceStrength: (parseField(b,'EVIDENCE_STRENGTH')||'').toUpperCase(),
  })).filter(r=>r.recommendation);
}
function parseSynthesis(text) {
  const t = text || '';
  return {
    verdict: parseField(t,'CLINICAL_VERDICT'), reasoning: parseField(t,'VERDICT_REASONING'),
    keyFinding: parseField(t,'KEY_FINDING'),   population: parseField(t,'PATIENT_POPULATION'),
    action: parseField(t,'RECOMMENDED_ACTION'), caution: parseField(t,'CAUTION'),
    step1: parseField(t,'STEP_1'), step2: parseField(t,'STEP_2'), step3: parseField(t,'STEP_3'),
    priorityRisk: parseField(t,'PRIORITY_RISK'),
  };
}
function formatBytes(b) {
  if (b<1024) return b+' B';
  if (b<1048576) return (b/1024).toFixed(1)+' KB';
  return (b/1048576).toFixed(1)+' MB';
}
function delay(ms) { return new Promise(r=>setTimeout(r,ms)); }

/* ─── design tokens ────────────────────────────────────────────────────── */

const SEV = {
  CRITICAL: { bg:'#fff1f2', border:'#fda4af', badge:'#e11d48', text:'#881337', icon:'🚨' },
  HIGH:     { bg:'#fff7ed', border:'#fdba74', badge:'#ea580c', text:'#7c2d12', icon:'⚠️' },
  MEDIUM:   { bg:'#fffbeb', border:'#fcd34d', badge:'#ca8a04', text:'#713f12', icon:'⚡' },
  LOW:      { bg:'#f0fdf4', border:'#86efac', badge:'#16a34a', text:'#14532d', icon:'ℹ️' },
};
const EV = {
  STRONG:   { bg:'#f0fdf4', color:'#16a34a', border:'#86efac' },
  MODERATE: { bg:'#fffbeb', color:'#d97706', border:'#fcd34d' },
  WEAK:     { bg:'#fff1f2', color:'#e11d48', border:'#fda4af' },
};
const VERDICT_CFG = {
  'STRONG EVIDENCE':       { color:'#15803d', bg:'#dcfce7', border:'#4ade80', short:'STRONG' },
  'MODERATE EVIDENCE':     { color:'#b45309', bg:'#fef3c7', border:'#fbbf24', short:'MODERATE' },
  'LIMITED EVIDENCE':      { color:'#c2410c', bg:'#ffedd5', border:'#fb923c', short:'LIMITED' },
  'INSUFFICIENT EVIDENCE': { color:'#4b5563', bg:'#f3f4f6', border:'#9ca3af', short:'INSUFFICIENT' },
};

/* ─── primitives ────────────────────────────────────────────────────────── */

function Spinner({ size=18, color='#1d4ed8' }) {
  return <div style={{
    width:size, height:size, flexShrink:0,
    border:`2.5px solid ${color}28`, borderTopColor:color,
    borderRadius:'50%', animation:'spin .65s linear infinite', display:'inline-block',
  }}/>;
}

function Badge({ children, bg='#eff6ff', color='#1d4ed8' }) {
  return <span style={{
    display:'inline-flex', alignItems:'center',
    background:bg, color, fontSize:'.65rem', fontWeight:700,
    letterSpacing:'.06em', textTransform:'uppercase',
    padding:'3px 10px', borderRadius:999, whiteSpace:'nowrap',
  }}>{children}</span>;
}

function Card({ children, style, className }) {
  return <div className={className} style={{
    background:'#fff', border:'1px solid #e2e8f0', borderRadius:12,
    boxShadow:'0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04)',
    ...style,
  }}>{children}</div>;
}

function SectionTitle({ title, sub }) {
  return <div style={{ marginBottom:18 }}>
    <h2 style={{ fontSize:'1rem', fontWeight:700, color:'#0f172a' }}>{title}</h2>
    {sub && <p style={{ fontSize:'.8rem', color:'#64748b', marginTop:3 }}>{sub}</p>}
  </div>;
}

function InfoBox({ label, children, accent }) {
  return <div style={{
    background: accent ? '#eff6ff' : '#f8fafc',
    border:`1px solid ${accent ? '#bfdbfe' : '#e2e8f0'}`,
    borderRadius:10, padding:'14px 16px',
  }}>
    <div style={{ fontSize:'.68rem', fontWeight:700, textTransform:'uppercase', letterSpacing:'.07em', color:'#94a3b8', marginBottom:6 }}>{label}</div>
    <div style={{ fontSize:'.9rem', color: accent ? '#1e3a8a' : '#0f172a', lineHeight:1.6, fontWeight: accent ? 600 : 400 }}>{children}</div>
  </div>;
}

/* ─── Header ────────────────────────────────────────────────────────────── */

function Header() {
  return <header style={{
    background:'linear-gradient(135deg,#0f172a 0%,#1e3a8a 55%,#1d4ed8 100%)',
    padding:'22px 40px', color:'#fff',
    borderBottom:'1px solid rgba(255,255,255,.08)',
  }}>
    <div style={{ maxWidth:1100, margin:'0 auto', display:'flex', alignItems:'center', gap:16 }}>
      <div style={{
        width:48, height:48, borderRadius:12, flexShrink:0,
        background:'rgba(255,255,255,.12)', backdropFilter:'blur(8px)',
        border:'1px solid rgba(255,255,255,.18)',
        display:'flex', alignItems:'center', justifyContent:'center', fontSize:'1.5rem',
      }}>🔬</div>
      <div>
        <h1 style={{ fontSize:'1.4rem', fontWeight:800, letterSpacing:'-.025em', lineHeight:1.2 }}>
          Medical Research Summarizer
        </h1>
        <p style={{ fontSize:'.8rem', opacity:.7, marginTop:3 }}>
          Multi-agent analysis · Orchestrator assigns custom tasks per paper · ChromaDB RAG
        </p>
      </div>
    </div>
  </header>;
}

/* ─── DropZone ──────────────────────────────────────────────────────────── */

function DropZone({ file, onFile, onRemove }) {
  const [dragging, setDragging] = useState(false);
  const inputRef = useRef(null);

  const handleDrop = useCallback(e => {
    e.preventDefault(); setDragging(false);
    if (e.dataTransfer.files[0]) onFile(e.dataTransfer.files[0]);
  }, [onFile]);

  return <div
    onClick={() => !file && inputRef.current?.click()}
    onDragOver={e => { e.preventDefault(); setDragging(true); }}
    onDragLeave={() => setDragging(false)}
    onDrop={handleDrop}
    style={{
      border:`2px dashed ${dragging ? '#3b82f6' : file ? '#4ade80' : '#cbd5e1'}`,
      borderRadius:10, padding:'36px 20px', textAlign:'center',
      cursor: file ? 'default' : 'pointer',
      background: dragging ? '#eff6ff' : file ? '#f0fdf4' : '#f8fafc',
      transition:'all .2s',
    }}
  >
    <input ref={inputRef} type="file" accept=".pdf,.txt" style={{ display:'none' }}
      onChange={e => e.target.files[0] && onFile(e.target.files[0])} />

    <div style={{ fontSize:'2.5rem', marginBottom:10 }}>{file ? '📄' : '📂'}</div>

    {file ? (
      <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:10 }}>
        <p style={{ fontWeight:700, color:'#0f172a', fontSize:'.95rem' }}>{file.name}</p>
        <p style={{ color:'#64748b', fontSize:'.8rem' }}>{formatBytes(file.size)}</p>
        <button onClick={e => { e.stopPropagation(); onRemove(); }} style={{
          background:'#fee2e2', color:'#dc2626', borderRadius:6,
          padding:'6px 14px', fontSize:'.78rem', fontWeight:700,
          transition:'background .15s',
        }}>✕ Remove</button>
      </div>
    ) : (
      <>
        <p style={{ fontWeight:600, color:'#0f172a', fontSize:'.9rem' }}>Drop PDF or TXT here</p>
        <p style={{ color:'#64748b', fontSize:'.8rem', marginTop:4 }}>
          or <span style={{ color:'#1d4ed8', fontWeight:600 }}>browse files</span>
        </p>
      </>
    )}
  </div>;
}

/* ─── UploadCard ────────────────────────────────────────────────────────── */

function UploadCard({ onAnalyze, loading }) {
  const [file, setFile]         = useState(null);
  const [text, setText]         = useState('');
  const [error, setError]       = useState('');
  const [sampling, setSampling] = useState(false);

  async function loadSample() {
    setSampling(true); setError('');
    try {
      const r = await fetch('/api/sample');
      const d = await r.json();
      setText(d.text); setFile(null);
    } catch(e) { setError('Could not load sample: ' + e.message); }
    finally { setSampling(false); }
  }

  function submit() {
    setError('');
    if (!file && !text.trim()) { setError('Please upload a file or paste text.'); return; }
    onAnalyze({ file, text });
  }

  return <Card style={{ padding:28 }}>
    <SectionTitle
      title="Upload research paper"
      sub="Accepts PDF or plain text — must be a medical or scientific research paper"
    />

    <DropZone file={file} onFile={f => { setFile(f); setText(''); }} onRemove={() => setFile(null)} />

    {/* divider */}
    <div style={{ display:'flex', alignItems:'center', gap:12, margin:'18px 0', color:'#94a3b8', fontSize:'.8rem' }}>
      <div style={{ flex:1, height:1, background:'#e2e8f0' }}/>
      or paste text directly
      <div style={{ flex:1, height:1, background:'#e2e8f0' }}/>
    </div>

    <textarea rows={6}
      placeholder="Paste the full text of a medical research paper here..."
      value={text}
      onChange={e => { setText(e.target.value); if (e.target.value) setFile(null); }}
      disabled={!!file}
    />

    {error && <div style={{
      marginTop:12, padding:'10px 14px',
      background:'#fef2f2', border:'1px solid #fca5a5',
      borderRadius:8, fontSize:'.8125rem', color:'#dc2626',
    }}>{error}</div>}

    <div style={{ display:'flex', gap:10, marginTop:16, flexWrap:'wrap' }}>
      <button onClick={submit} disabled={loading} style={{
        background: loading ? '#60a5fa' : '#1d4ed8', color:'#fff',
        borderRadius:8, padding:'11px 22px', fontSize:'.875rem', fontWeight:600,
        display:'flex', alignItems:'center', gap:8, transition:'background .2s',
      }}>
        {loading && <Spinner size={16} color="#fff"/>}
        {loading ? 'Analyzing…' : 'Analyze paper'}
      </button>
      <button onClick={loadSample} disabled={sampling || loading} style={{
        background:'#f8fafc', color:'#374151',
        border:'1px solid #e2e8f0', borderRadius:8,
        padding:'11px 18px', fontSize:'.875rem', fontWeight:500,
        display:'flex', alignItems:'center', gap:8,
      }}>
        {sampling && <Spinner size={14} color="#64748b"/>}
        Load sample paper
      </button>
    </div>
  </Card>;
}

/* ─── PipelineSteps ─────────────────────────────────────────────────────── */

const STEP_LABELS = [
  'Reading paper',
  'Validating document type',
  'Gate decision',
  'Generating agent tasks & dispatching',
];

function StepRow({ number, label, status, detail, style: extraStyle }) {
  const cfg = {
    idle:    { bg:'#f1f5f9', border:'#e2e8f0', icoFg:'#94a3b8', icoBg:'#e2e8f0' },
    loading: { bg:'#eff6ff', border:'#bfdbfe', icoFg:'#1d4ed8', icoBg:'#dbeafe' },
    pass:    { bg:'#f0fdf4', border:'#bbf7d0', icoFg:'#16a34a', icoBg:'#dcfce7' },
    fail:    { bg:'#fef2f2', border:'#fecaca', icoFg:'#dc2626', icoBg:'#fee2e2' },
  }[status] || { bg:'#f1f5f9', border:'#e2e8f0', icoFg:'#94a3b8', icoBg:'#e2e8f0' };

  return <div style={{
    display:'flex', alignItems:'center', gap:14,
    padding:'13px 16px', borderRadius:10,
    background:cfg.bg, border:`1px solid ${cfg.border}`,
    transition:'all .35s ease', ...extraStyle,
  }}>
    <div style={{
      width:34, height:34, borderRadius:'50%', flexShrink:0,
      background:cfg.icoBg, color:cfg.icoFg,
      display:'flex', alignItems:'center', justifyContent:'center',
      fontSize:'.75rem', fontWeight:700,
    }}>
      {status === 'loading' ? <Spinner size={15} color="#1d4ed8"/>
       : status === 'pass'  ? '✓'
       : status === 'fail'  ? '✗'
       : number}
    </div>
    <div style={{ flex:1, minWidth:0 }}>
      <div style={{ fontWeight:600, fontSize:'.875rem', color:'#0f172a' }}>{label}</div>
      {detail && <div style={{ fontSize:'.76rem', color:'#64748b', marginTop:2, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{detail}</div>}
    </div>
    {status === 'pass' && <span style={{ fontSize:'.7rem', fontWeight:700, color:'#16a34a', flexShrink:0 }}>PASS</span>}
    {status === 'fail' && <span style={{ fontSize:'.7rem', fontWeight:700, color:'#dc2626', flexShrink:0 }}>FAIL</span>}
  </div>;
}

function PipelineSteps({ steps }) {
  return <Card className="fade-up" style={{ padding:24 }}>
    <SectionTitle title="Processing pipeline" sub="7-step multi-agent orchestration" />
    <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
      {STEP_LABELS.map((label, i) => (
        <StepRow key={i} number={i+1} label={label} {...(steps[i] || { status:'idle', detail:'Waiting…' })}
          style={{ animationDelay: `${i * .07}s` }}
        />
      ))}
    </div>
  </Card>;
}

/* ─── RejectionBanner ───────────────────────────────────────────────────── */

function RejectionBanner({ data }) {
  return <div className="fade-up" style={{
    background:'#fef2f2', border:'1px solid #fca5a5',
    borderRadius:12, padding:'22px 26px',
  }}>
    <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:12 }}>
      <span style={{ fontSize:'1.3rem' }}>🚫</span>
      <h3 style={{ color:'#dc2626', fontWeight:700, fontSize:'1rem' }}>Document rejected</h3>
    </div>
    <div style={{ display:'flex', flexDirection:'column', gap:6, fontSize:'.875rem', color:'#7f1d1d', lineHeight:1.65 }}>
      <p><strong>Detected type:</strong> {data.documentType}</p>
      <p><strong>Reason:</strong> {data.reason}</p>
      {data.missing && <p><strong>Missing:</strong> {data.missing}</p>}
    </div>
    <div style={{ marginTop:14, padding:'10px 14px', background:'#fee2e2', borderRadius:8, fontSize:'.76rem', color:'#9b2c2c', lineHeight:1.6 }}>
      ✅ Accepted: Clinical Trial · Meta-Analysis · Systematic Review · Observational Study · Case Study · Pharmacological Study
    </div>
  </div>;
}

/* ─── OrchestratorPanel ─────────────────────────────────────────────────── */

const AGENT_SCHEMES = [
  { agent:'data extractor',      title:'Agent 1 — Clinical Data Extractor',         bg:'#eff6ff', border:'#bfdbfe', badgeBg:'#1d4ed8', badgeColor:'#fff', tc:'#1e3a8a', taskKey:'agent1Task' },
  { agent:'risk analyzer',       title:'Agent 2 — Risk & Limitations Analyzer',     bg:'#fef2f2', border:'#fca5a5', badgeBg:'#dc2626', badgeColor:'#fff', tc:'#7f1d1d', taskKey:'agent2Task' },
  { agent:'recommendation',      title:'Agent 3 — Treatment Recommendation Writer', bg:'#f0fdfa', border:'#99f6e4', badgeBg:'#0d9488', badgeColor:'#fff', tc:'#134e4a', taskKey:'agent3Task' },
];

function AgentTaskCard({ scheme, task, index }) {
  const [hovered, setHovered] = useState(false);
  return <div
    onMouseEnter={() => setHovered(true)}
    onMouseLeave={() => setHovered(false)}
    style={{
      background:scheme.bg, border:`1px solid ${scheme.border}`,
      borderRadius:10, padding:18,
      transform: hovered ? 'translateY(-3px)' : 'none',
      boxShadow: hovered ? '0 8px 28px rgba(0,0,0,.1)' : 'none',
      transition:'transform .2s, box-shadow .2s',
      animation:`fadeUp .4s ease ${index * .1}s both`,
    }}
  >
    <Badge bg={scheme.badgeBg} color={scheme.badgeColor}>{scheme.agent}</Badge>
    <div style={{ fontWeight:700, fontSize:'.875rem', color:scheme.tc, margin:'8px 0 6px' }}>{scheme.title}</div>
    <div style={{ fontSize:'.8rem', color:'#374151', lineHeight:1.65, whiteSpace:'pre-wrap', wordBreak:'break-word' }}>{task || '—'}</div>
  </div>;
}

function OrchestratorPanel({ plan }) {
  return <Card className="fade-up" style={{ padding:24 }}>
    <SectionTitle
      title="Orchestrator — dynamic task assignment"
      sub="The orchestrator read this specific paper and generated these custom instructions for each agent"
    />
    <div className="grid-3">
      {AGENT_SCHEMES.map((s, i) => <AgentTaskCard key={s.taskKey} scheme={s} task={plan[s.taskKey]} index={i}/>)}
    </div>
  </Card>;
}

/* ─── PaperInfoBar ──────────────────────────────────────────────────────── */

function Pill({ icon, label }) {
  return <span style={{
    display:'inline-flex', alignItems:'center', gap:6,
    background:'#fff', border:'1px solid #e2e8f0',
    borderRadius:999, padding:'6px 14px',
    fontSize:'.78rem', fontWeight:600, color:'#374151', whiteSpace:'nowrap',
    boxShadow:'0 1px 2px rgba(0,0,0,.05)',
  }}>{icon} {label}</span>;
}

function PaperInfoBar({ data }) {
  return <div className="fade-up" style={{ display:'flex', flexWrap:'wrap', gap:8, padding:'4px 0' }}>
    <Pill icon="📋" label={data.paperType}/>
    <Pill icon="💊" label={data.diseaseOrDrug}/>
    <Pill icon="📦" label={`${data.chunkCount} chunks`}/>
    <Pill icon="🔍" label={`top-${data.ragInfo?.topK} RAG`}/>
    <Pill icon="🧬" label={data.ragInfo?.embeddingModel}/>
    <Pill icon="🗄️" label="ChromaDB in-memory"/>
  </div>;
}

/* ─── AgentOutputSection ────────────────────────────────────────────────── */

const AGENT_OUTPUT_DEFS = [
  { key:'extractor',     title:'Clinical Data Extractor',          badge:'quantitative extraction', desc:'Extracts trial results, dosages, p-values, efficacy data, sample sizes, and statistical outcomes', badgeBg:'#eff6ff', badgeColor:'#1d4ed8', topBar:'#3b82f6' },
  { key:'risk',          title:'Risk & Limitations Analyzer',      badge:'safety analysis',         desc:'Finds adverse events, study design flaws, contraindications, and patient safety signals',          badgeBg:'#fef2f2', badgeColor:'#dc2626', topBar:'#ef4444' },
  { key:'recommendation',title:'Treatment Recommendation Writer',  badge:'clinical synthesis',      desc:'Writes actionable prescribing guidance for clinicians based on the evidence',                       badgeBg:'#f0fdfa', badgeColor:'#0d9488', topBar:'#14b8a6' },
];

function AgentOutputCard({ def, output, index }) {
  return <Card className="fade-up" style={{ padding:20, borderTop:`3px solid ${def.topBar}`, animationDelay:`${index * .1}s` }}>
    <Badge bg={def.badgeBg} color={def.badgeColor}>{def.badge}</Badge>

    <div style={{

      padding:'12px 14px', fontFamily:'"SF Mono","Fira Code","Cascadia Code",monospace',

}

function AgentOutputSection({ agents }) {

}

/* ─── ClinicalSummary tabs ──────────────────────────────────────────────── */

/* Verdict tab */
function VerdictCircle({ verdict }) {
  const cfg = VERDICT_CFG[verdict] || VERDICT_CFG['INSUFFICIENT EVIDENCE'];
  return <div style={{ textAlign:'center', marginBottom:24 }}>
    <div style={{
      display:'inline-flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center',
      width:130, height:130, borderRadius:'50%',
      background:cfg.bg, border:`4px solid ${cfg.border}`,
      color:cfg.color, fontWeight:800, fontSize:'.8rem',
      lineHeight:1.3, padding:14, textAlign:'center',
      animation:'scaleIn .4s ease both',
      boxShadow:`0 0 0 8px ${cfg.border}40`,
    }}>{cfg.short}<br/>EVIDENCE</div>
  </div>;
}

function ActionStep({ number, text }) {
  return <div style={{
    display:'flex', alignItems:'flex-start', gap:12,
    padding:'13px 16px', background:'#fff',
    border:'1px solid #e2e8f0', borderRadius:10,
    fontSize:'.875rem', color:'#374151', lineHeight:1.55,
    animation:`fadeUp .3s ease ${number * .1}s both`,
  }}>
    <div style={{
      minWidth:30, height:30, borderRadius:'50%',
      background:'#1d4ed8', color:'#fff',
      display:'flex', alignItems:'center', justifyContent:'center',
      fontSize:'.78rem', fontWeight:700, flexShrink:0,
    }}>{number}</div>
    {text}
  </div>;
}

function VerdictTab({ syn }) {
  return <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
    <VerdictCircle verdict={syn.verdict}/>
    <InfoBox label="Verdict reasoning">{syn.reasoning}</InfoBox>
    <div className="grid-2">
      <InfoBox label="Key finding">
        <span style={{ fontWeight:800, fontSize:'1.05rem' }}>{syn.keyFinding}</span>
      </InfoBox>
      <InfoBox label="Patient population">{syn.population}</InfoBox>
    </div>
    <InfoBox label="Recommended action" accent>{syn.action}</InfoBox>
    <div style={{ background:'#fffbeb', border:'1px solid #fcd34d', borderRadius:10, padding:'14px 16px' }}>
      <div style={{ fontSize:'.68rem', fontWeight:700, textTransform:'uppercase', letterSpacing:'.07em', color:'#d97706', marginBottom:6 }}>⚠️ Caution</div>
      <div style={{ fontSize:'.9rem', color:'#78350f', lineHeight:1.6 }}>{syn.caution}</div>
    </div>
    <div>
      <div style={{ fontSize:'.7rem', fontWeight:700, textTransform:'uppercase', letterSpacing:'.07em', color:'#94a3b8', marginBottom:8 }}>3-Step Action Plan</div>
      <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
        {[syn.step1, syn.step2, syn.step3].filter(Boolean).map((s, i) => <ActionStep key={i} number={i+1} text={s}/>)}
      </div>
    </div>
    <div style={{ background:'#fef2f2', border:'1px solid #fca5a5', borderRadius:10, padding:'14px 16px' }}>
      <div style={{ fontSize:'.68rem', fontWeight:700, textTransform:'uppercase', letterSpacing:'.07em', color:'#dc2626', marginBottom:6 }}>Priority risk for patients</div>
      <div style={{ fontSize:'.875rem', color:'#7f1d1d', lineHeight:1.6 }}>{syn.priorityRisk}</div>
    </div>
  </div>;
}

/* Data tab */
function FindingCard({ finding, value, context, significance, index }) {
  const [hovered, setHovered] = useState(false);
  return <div
    onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}
    style={{
      background:'#eff6ff', border:'1px solid #bfdbfe', borderRadius:10, padding:16,
      transform: hovered ? 'translateY(-2px)' : 'none',
      boxShadow: hovered ? '0 6px 20px rgba(29,78,216,.12)' : 'none',
      transition:'transform .2s, box-shadow .2s',
      animation:`fadeUp .3s ease ${index * .05}s both`,
    }}
  >
    <div style={{ fontSize:'.68rem', fontWeight:700, color:'#1d4ed8', textTransform:'uppercase', letterSpacing:'.05em', marginBottom:4 }}>{finding}</div>
    <div style={{ fontSize:'1.3rem', fontWeight:800, color:'#0f172a', marginBottom:8 }}>{value}</div>
    <div style={{ fontSize:'.78rem', color:'#475569', lineHeight:1.55 }}>{context}</div>
    {significance && significance !== 'NOT REPORTED' && (
      <div style={{ marginTop:8, display:'inline-block', background:'#dbeafe', color:'#1e40af', borderRadius:6, padding:'3px 8px', fontSize:'.72rem', fontWeight:700 }}>
        {significance}
      </div>
    )}

}

function DataTab({ text }) {
  const findings = useMemo(() => parseFindings(text), [text]);
  if (!findings.length) return <p style={{ color:'#94a3b8', textAlign:'center', padding:48 }}>No quantitative findings extracted.</p>;
  return <div className="grid-auto">
    {findings.map((f, i) => <FindingCard key={i} index={i} {...f}/>)}
  </div>;
}

/* Risks tab */
function RiskCard({ riskItem, severity, description, implication, index }) {
  const c = SEV[severity] || SEV.LOW;
  return <div style={{
    background:c.bg, border:`1px solid ${c.border}`,
    borderRadius:10, padding:'14px 16px',
    animation:`fadeUp .3s ease ${index * .05}s both`,
  }}>
    <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:8, flexWrap:'wrap' }}>
      <span style={{
        background:c.badge, color:'#fff',
        fontSize:'.62rem', fontWeight:700, padding:'3px 9px',
        borderRadius:999, letterSpacing:'.07em', textTransform:'uppercase', flexShrink:0,
      }}>{severity}</span>
      <span style={{ fontWeight:700, fontSize:'.875rem', color:c.text }}>{c.icon} {riskItem}</span>
    </div>
    <p style={{ fontSize:'.8125rem', color:'#4b5563', lineHeight:1.65 }}>{description}</p>
    {implication && <p style={{ fontSize:'.78rem', color:'#64748b', fontStyle:'italic', marginTop:8, lineHeight:1.5 }}>
      Clinical implication: {implication}
    </p>}
  </div>;
}

function RisksTab({ text, meta }) {
  const risks = useMemo(() => parseRisks(text), [text]);
  return <div>
    <div style={{ display:'flex', gap:8, flexWrap:'wrap', marginBottom:18 }}>
      {meta.criticalRiskCount > 0 && <span style={{ background:'#e11d48', color:'#fff', borderRadius:999, padding:'5px 14px', fontSize:'.78rem', fontWeight:700 }}>{meta.criticalRiskCount} Critical</span>}
      {meta.highRiskCount     > 0 && <span style={{ background:'#ea580c', color:'#fff', borderRadius:999, padding:'5px 14px', fontSize:'.78rem', fontWeight:700 }}>{meta.highRiskCount} High</span>}
      {meta.mediumRiskCount   > 0 && <span style={{ background:'#ca8a04', color:'#fff', borderRadius:999, padding:'5px 14px', fontSize:'.78rem', fontWeight:700 }}>{meta.mediumRiskCount} Medium</span>}
    </div>
    {risks.length
      ? <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          {risks.map((r, i) => <RiskCard key={i} index={i} {...r}/>)}
        </div>
      : <p style={{ color:'#94a3b8', textAlign:'center', padding:48 }}>No risk items extracted.</p>
    }
  </div>;
}

/* Reco tab */
function RecoCard({ recommendation, patientProfile, dosage, monitoring, contraindication, evidenceStrength, index }) {
  const ev = EV[evidenceStrength] || EV.WEAK;
  return <div style={{
    background:'#f0fdfa', border:'1px solid #99f6e4',
    borderRadius:10, padding:18,
    animation:`fadeUp .3s ease ${index * .06}s both`,
  }}>
    <div style={{ fontWeight:700, fontSize:'.9375rem', color:'#134e4a', marginBottom:12, lineHeight:1.4 }}>{recommendation}</div>
    <div className="reco-inner" style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'6px 18px', fontSize:'.8125rem' }}>
      {[['Patient',patientProfile],['Dosage / Protocol',dosage],['Monitoring',monitoring],['Contraindication',contraindication]].map(([lbl, val]) => (
        <React.Fragment key={lbl}>
          <div style={{ color:'#0d9488', fontWeight:700, paddingTop:2 }}>{lbl}</div>
          <div style={{ color:'#374151', lineHeight:1.55 }}>{val || '—'}</div>
        </React.Fragment>
      ))}
    </div>
    <span style={{
      display:'inline-block', marginTop:10,
      background:ev.bg, color:ev.color, border:`1px solid ${ev.border}`,
      fontSize:'.63rem', fontWeight:700, padding:'3px 10px',
      borderRadius:999, letterSpacing:'.06em', textTransform:'uppercase',
    }}>{evidenceStrength || '—'} EVIDENCE</span>

function RecoTab({ text }) {
  const recos = useMemo(() => parseRecos(text), [text]);
  if (!recos.length) return <p style={{ color:'#94a3b8', textAlign:'center', padding:48 }}>No recommendations extracted.</p>;
  return <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
    {recos.map((r, i) => <RecoCard key={i} index={i} {...r}/>)}
  </div>;
}

/* Plan tab */
function PlanTab({ data }) {
  const raw = [
    `PAPER_TYPE: ${data.paperType}`,
    `DISEASE_OR_DRUG: ${data.diseaseOrDrug}`,
    `STUDY_DESIGN_SUMMARY: ${data.studySummary}`,
    '',
    `AGENT_1_TASK:\n${data.orchestratorPlan?.agent1Task}`,
    '',
    `AGENT_2_TASK:\n${data.orchestratorPlan?.agent2Task}`,
    '',
    `AGENT_3_TASK:\n${data.orchestratorPlan?.agent3Task}`,
  ].join('\n');
  return <div>
    <p style={{ fontSize:'.8rem', color:'#64748b', marginBottom:14 }}>
      Raw orchestrator output — the exact custom instructions generated after reading this specific paper.
    </p>
    <pre style={{
      background:'#0f172a', color:'#e2e8f0', borderRadius:10,
      padding:'18px 20px', fontFamily:'"SF Mono","Fira Code",monospace',
      fontSize:'.73rem', lineHeight:1.75, whiteSpace:'pre-wrap', wordBreak:'break-word',
      maxHeight:520, overflowY:'auto',
    }}>{raw}</pre>
  </div>;
}

/* Tab bar with animated underline */
const TABS = [
  { id:'verdict', label:'Clinical Verdict' },
  { id:'data',    label:'Extracted Data'  },
  { id:'risks',   label:'Risk & Safety'   },
  { id:'reco',    label:'Treatment Guidance' },
  { id:'plan',    label:'Orchestrator Plan' },
];

function TabBar({ active, onChange }) {
  const refs = useRef({});
  const [ind, setInd] = useState({ left:0, width:80 });

  useEffect(() => {
    const el = refs.current[active];
    if (el) setInd({ left: el.offsetLeft, width: el.offsetWidth });
  }, [active]);

  return <div style={{ position:'relative', borderBottom:'2px solid #e2e8f0', marginBottom:24, display:'flex', flexWrap:'wrap', gap:0 }}>
    {TABS.map(t => (
      <button key={t.id}
        ref={el => refs.current[t.id] = el}
        onClick={() => onChange(t.id)}
        style={{
          background:'none', border:'none',
          padding:'10px 16px', fontSize:'.875rem',
          fontWeight: active===t.id ? 700 : 500,
          color: active===t.id ? '#1d4ed8' : '#64748b',
          cursor:'pointer', transition:'color .15s',
          borderRadius:'6px 6px 0 0',
        }}
      >{t.label}</button>
    ))}
    <div style={{
      position:'absolute', bottom:-2, height:2, borderRadius:1,
      background:'#1d4ed8',
      left: ind.left, width: ind.width,
      transition:'left .25s cubic-bezier(.4,0,.2,1), width .25s cubic-bezier(.4,0,.2,1)',
    }}/>
  </div>;
}

/* Clinical Summary */
function ClinicalSummary({ result }) {
  const [tab, setTab] = useState('verdict');
  const syn = useMemo(() => parseSynthesis(result.synthesis), [result.synthesis]);

  return <Card className="fade-up" style={{ padding:28 }}>
    <SectionTitle title="Clinical Summary"/>
    <TabBar active={tab} onChange={setTab}/>
    {tab === 'verdict' && <VerdictTab syn={syn}/>}
    {tab === 'data'    && <DataTab    text={result.agents?.extractor}/>}
    {tab === 'risks'   && <RisksTab   text={result.agents?.risk} meta={result.meta||{}}/>}
    {tab === 'reco'    && <RecoTab    text={result.agents?.recommendation}/>}
    {tab === 'plan'    && <PlanTab    data={result}/>}
  </Card>;
}

/* ─── App root ──────────────────────────────────────────────────────────── */

const INIT_STEPS = STEP_LABELS.map(() => ({ status:'idle', detail:'Waiting…' }));

function App() {
  const [phase, setPhase]   = useState('idle');   // idle | loading | rejected | complete
  const [steps, setSteps]   = useState(INIT_STEPS);
  const [result, setResult] = useState(null);

  function patchStep(i, patch) {
    setSteps(prev => prev.map((s, idx) => idx === i ? { ...s, ...patch } : s));
  }

  async function handleAnalyze({ file, text }) {
    setPhase('loading');
    setSteps(INIT_STEPS);
    setResult(null);

    const fd = new FormData();
    if (file) fd.append('paper', file, file.name);
    else      fd.append('text', text);

    patchStep(0, { status:'loading', detail:'Extracting text…' });
    await delay(480);
    patchStep(0, { status:'pass', detail:'Document text extracted' });

    patchStep(1, { status:'loading', detail:'Classifying document via GPT-4o…' });
    await delay(480);

    let data;
    try {
      const resp = await fetch('/api/analyze', { method:'POST', body:fd });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: resp.statusText }));
        throw new Error(err.detail || `Server error ${resp.status}`);
      }
      data = await resp.json();
    } catch(e) {
      patchStep(1, { status:'fail', detail:'Request failed: ' + e.message });
      patchStep(2, { status:'fail', detail:'Pipeline aborted' });
      patchStep(3, { status:'fail', detail:'Pipeline aborted' });
      setPhase('idle');
      return;
    }

    patchStep(1, { status:'pass', detail:`Detected: ${data.documentType || '—'}` });
    await delay(120);

    if (!data.valid) {
      patchStep(2, { status:'fail', detail:'Not a medical research paper — rejected' });
      patchStep(3, { status:'fail', detail:'Pipeline aborted' });
      setResult(data); setPhase('rejected');
      return;
    }

    patchStep(2, { status:'pass', detail:'Valid research paper — pipeline unlocked' });
    await delay(120);
    patchStep(3, { status:'pass', detail:`Tasks generated · RAG (${data.ragInfo?.totalChunks} chunks, top-${data.ragInfo?.topK}) · 3 agents parallel · Synthesized` });

    setResult(data); setPhase('complete');
  }

  return <div>
    <Header/>
    <div style={{ maxWidth:1100, margin:'32px auto', padding:'0 24px', display:'flex', flexDirection:'column', gap:24 }}>
      <UploadCard onAnalyze={handleAnalyze} loading={phase === 'loading'}/>

      {phase !== 'idle' && <PipelineSteps steps={steps}/>}

      {phase === 'rejected' && result && <RejectionBanner data={result}/>}

      {phase === 'complete' && result && <>
        <OrchestratorPanel plan={result.orchestratorPlan || {}}/>
        <PaperInfoBar data={result}/>
        <AgentOutputSection agents={result.agents || {}}/>
        <ClinicalSummary result={result}/>
      </>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
