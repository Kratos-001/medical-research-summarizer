<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medical Research Summarizer</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F8FAFC;
      --text: #0F172A;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    @keyframes fadeIn { 
      from { opacity: 0; transform: translateY(4px); } 
      to { opacity: 1; transform: translateY(0); } 
    }
    @keyframes spin { 
      to { transform: rotate(360deg); } 
    }

    .fade-in { animation: fadeIn 0.3s ease both; }

    /* Responsive grids */
    .grid-3 { display:grid; grid-template-columns:repeat(3, 1fr); gap:16px; }
    .grid-2 { display:grid; grid-template-columns:repeat(2, 1fr); gap:16px; }
    .grid-auto { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:16px; }

    @media (max-width:820px) {
      .grid-3, .grid-2 { grid-template-columns:1fr; }
    }
    @media (max-width:600px) {
      .reco-inner { grid-template-columns:1fr !important; }
    }

    /* Textarea */
    textarea {
      width:100%; resize:vertical;
      border:1px solid #D1D5DB; border-radius:6px;
      padding:12px 16px; font-family:inherit; font-size:0.875rem;
      color:var(--text); background:#fff; outline:none;
      transition: border-color .15s, box-shadow .15s; line-height:1.6;
    }
    textarea:focus { border-color:#0F172A; box-shadow:0 0 0 1px #0F172A; }
    textarea::placeholder { color:#9CA3AF; }
    textarea:disabled { opacity:.6; cursor:not-allowed; background:#F9FAFB; }

    button { cursor:pointer; border:none; font-family:inherit; }
    button:disabled { cursor:not-allowed; opacity:.6; }

    .btn-primary:not(:disabled):hover { background: #1E293B !important; }
    .btn-secondary:not(:disabled):hover { background: #F3F4F6 !important; }
    .hover-red:not(:disabled):hover { background: #FEF2F2 !important; }

    /* Scrollbar */
    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#CBD5E1; border-radius:4px; }
    ::-webkit-scrollbar-thumb:hover { background:#9CA3AF; }
    
    .scrollbar-dark::-webkit-scrollbar-thumb { background:#4B5563; }
    .scrollbar-dark::-webkit-scrollbar-thumb:hover { background:#6B7280; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="/app.js"></script>

</body>
</html>
